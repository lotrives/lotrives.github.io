title: "Lotrives"
description: "Una mirada al mundo que somos"

author: "José Manuel Grau Navarro"

lang: "es"
timezone: "Europe/Madrid"

theme: minima

url: "https://lotrives.github.io"
baseurl: ""

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-last-modified-at

google_analytics: G-BT8CB5X306

og_image: /assets/images/og-default.webp

include:
  - _pages

header_pages:
  - _pages/acerca.md
  - _pages/archivo.md
  - _pages/etiquetas.md
  - _pages/buscar.md
  - _pages/newsletter.md

minima:
  social_links:
    - title: "X (Twitter)"
      icon: x-twitter
      url: "https://x.com/jmgraunavarro"
    - title: "GitHub"
      icon: github
      url: "https://github.com/lotrives"

twitter_username: "jmgraunavarro"
github_username: "lotrives"

sass:
  style: compressed
