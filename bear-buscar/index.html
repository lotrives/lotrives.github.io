<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscar — grau.bearblog.dev</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Verdana, sans-serif;
    font-size: 1rem;
    line-height: 1.6;
    color: #444;
    max-width: 720px;
    margin: auto;
    padding: 20px;
    background: #fff;
  }
  h1 { font-size: 1.5rem; color: #222; margin-bottom: 0.3rem; }
  .back { font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; display: block; }
  .back a { color: #3273dc; text-decoration: none; }
  .back a:hover { text-decoration: underline; }

  #buscador-input-wrap {
    position: relative;
    margin-bottom: 0.75rem;
  }
  #buscador-input-wrap svg {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  #buscador-q {
    width: 100%;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    font-family: inherit;
    font-size: 1rem;
    border: 1.5px solid #ccc;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  #buscador-q:focus { border-color: #333; }

  #buscador-status {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 1rem;
    min-height: 1.2em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid #ccc;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .b-card {
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.8rem;
    transition: border-color 0.15s;
  }
  .b-card:hover { border-color: #aaa; }
  .b-card a {
    font-weight: bold;
    display: block;
    margin-bottom: 0.2rem;
    color: #3273dc;
    text-decoration: none;
  }
  .b-card a:hover { text-decoration: underline; }
  .b-date { font-size: 0.75rem; color: #888; margin-bottom: 0.4rem; }
  .b-excerpt { font-size: 0.9rem; color: #555; line-height: 1.5; }
  .b-excerpt mark { background: #ffeaa0; border-radius: 2px; padding: 0 2px; }
  .b-tags { margin-top: 0.5rem; font-size: 0.75rem; color: #888; }
  .b-nada { font-style: italic; color: #888; }

  .error-box {
    background: #fff5f5;
    border: 1px solid #fcc;
    border-radius: 4px;
    padding: 0.8rem 1rem;
    font-size: 0.85rem;
    color: #c00;
    margin-bottom: 1rem;
  }
  .error-box a { color: #c00; }

  #retry-btn {
    background: none;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 0.3rem 0.7rem;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    color: #444;
    margin-top: 0.6rem;
    display: inline-block;
  }
  #retry-btn:hover { border-color: #888; }
</style>
</head>
<body>

<span class="back"><a href="https://grau.bearblog.dev">← grau.bearblog.dev</a></span>
<h1>Buscar</h1>
<p style="font-size:0.85rem;color:#888;margin-bottom:1.5rem;">Busca en títulos, textos y etiquetas de todas las entradas.</p>

<div id="buscador-input-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="search" id="buscador-q" placeholder="Busca títulos, textos, etiquetas…" autocomplete="off" disabled>
</div>
<div id="buscador-status"></div>
<div id="buscador-results"></div>

<script>
(function () {
  // ── Feed URL y proxies con fallback ───────────────────────────────────────
  const FEED_URL = 'https://grau.bearblog.dev/feed/';
  const CACHE_KEY = 'grau_feed_cache';
  const CACHE_TTL = 10 * 60 * 1000; // 10 minutos

  // Lista de proxies CORS en orden de preferencia
  const PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`,
  ];

  let posts = [], loaded = false;
  const input   = document.getElementById('buscador-q');
  const status  = document.getElementById('buscador-status');
  const results = document.getElementById('buscador-results');

  // ── Utilidades ────────────────────────────────────────────────────────────

  function setStatus(html, showSpinner = false) {
    status.innerHTML = (showSpinner ? '<span class="spinner"></span>' : '') + html;
  }

  // fetch con timeout configurable
  function fetchWithTimeout(url, ms = 8000) {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), ms);
    return fetch(url, { signal: controller.signal })
      .finally(() => clearTimeout(tid));
  }

  // Intenta cada proxy en orden; devuelve el texto o lanza error
  async function fetchFeed() {
    let lastErr;
    for (const makeUrl of PROXIES) {
      try {
        const res = await fetchWithTimeout(makeUrl(FEED_URL), 8000);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.text();
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr || new Error('Todos los proxies fallaron');
  }

  function parseXML(text) {
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    // Detectar error de parseo
    if (xml.querySelector('parsererror')) throw new Error('XML inválido');
    const items = xml.querySelectorAll('entry, item');
    return Array.from(items).map(item => {
      const title = item.querySelector('title')?.textContent?.trim() || '';
      // <link href="…"> (Atom) o <link> (RSS)
      const linkEl = item.querySelector('link');
      const link = linkEl?.getAttribute('href') || linkEl?.textContent?.trim() || '';
      const date = item.querySelector('published, pubDate, updated')?.textContent || '';
      const content = item.querySelector('content, description, summary')?.textContent || '';
      const cats = Array.from(item.querySelectorAll('category'))
        .map(c => c.getAttribute('term') || c.textContent?.trim())
        .filter(Boolean);
      const tmp = document.createElement('div');
      tmp.innerHTML = content;
      return { title, link, date, plain: tmp.textContent || '', cats };
    });
  }

  // ── Caché en sessionStorage ───────────────────────────────────────────────

  function saveCache(data) {
    try {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
    } catch (_) {}
  }

  function loadCache() {
    try {
      const raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) return null;
      return data;
    } catch (_) { return null; }
  }

  // ── Carga principal ───────────────────────────────────────────────────────

  async function loadFeed() {
    // 1. Intentar caché primero (carga instantánea)
    const cached = loadCache();
    if (cached) {
      posts = cached;
      loaded = true;
      input.disabled = false;
      input.focus();
      setStatus(posts.length + ' entradas indexadas <span style="color:#bbb">(caché)</span>');
      return;
    }

    setStatus('Cargando entradas…', true);

    try {
      const text = await fetchFeed();
      posts = parseXML(text);
      if (!posts.length) throw new Error('El feed no contiene entradas');
      saveCache(posts);
      loaded = true;
      input.disabled = false;
      input.focus();
      setStatus(posts.length + ' entradas indexadas');
    } catch (e) {
      const msg = e.name === 'AbortError' ? 'Tiempo de espera agotado.' : (e.message || 'Error desconocido');
      results.innerHTML =
        '<div class="error-box">' +
        '⚠️ No se pudo cargar el feed: <strong>' + escHtml(msg) + '</strong><br>' +
        '<small>Puede ser un problema temporal. Prueba de nuevo en unos segundos.</small><br>' +
        '<button id="retry-btn">↻ Reintentar</button>' +
        '</div>';
      setStatus('Error al cargar el feed.');
      document.getElementById('retry-btn')?.addEventListener('click', () => {
        results.innerHTML = '';
        loadFeed();
      });
    }
  }

  // ── Búsqueda ──────────────────────────────────────────────────────────────

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function hl(text, q) {
    if (!q) return escHtml(text);
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escHtml(text).replace(
      new RegExp('(' + escHtml(safe) + ')', 'gi'),
      '<mark>$1</mark>'
    );
  }

  function excerpt(text, q) {
    const idx = q ? text.toLowerCase().indexOf(q.toLowerCase()) : -1;
    const s = idx > 60 ? idx - 60 : 0;
    let chunk = text.slice(s, s + 220);
    if (s > 0) chunk = '…' + chunk;
    if (s + 220 < text.length) chunk += '…';
    return hl(chunk, q);
  }

  function fmtDate(raw) {
    if (!raw) return '';
    const d = new Date(raw);
    return isNaN(d) ? raw : d.toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });
  }

  function search(query) {
    if (!loaded) return;
    const q = query.trim();
    if (!q) {
      results.innerHTML = '';
      setStatus(posts.length + ' entradas indexadas');
      return;
    }
    const ql = q.toLowerCase();
    const matched = posts.filter(p =>
      p.title.toLowerCase().includes(ql) ||
      p.plain.toLowerCase().includes(ql) ||
      p.cats.some(c => c.toLowerCase().includes(ql))
    );
    const n = matched.length;
    setStatus(n + ' resultado' + (n !== 1 ? 's' : '') + ' para "<strong>' + escHtml(q) + '</strong>"');
    if (!n) { results.innerHTML = '<p class="b-nada">No se encontró nada.</p>'; return; }
    results.innerHTML = matched.map(p =>
      '<div class="b-card">' +
      '<a href="' + escHtml(p.link) + '" target="_blank" rel="noopener">' + hl(p.title, q) + '</a>' +
      '<div class="b-date">' + fmtDate(p.date) + '</div>' +
      '<div class="b-excerpt">' + excerpt(p.plain, q) + '</div>' +
      (p.cats.length ? '<div class="b-tags">' + p.cats.map(c => '#' + escHtml(c)).join(' ') + '</div>' : '') +
      '</div>'
    ).join('');
  }

  // ── Evento de input ───────────────────────────────────────────────────────

  let timer;
  input.addEventListener('input', function (e) {
    clearTimeout(timer);
    timer = setTimeout(() => search(e.target.value), 250);
  });

  // ── Arrancar ──────────────────────────────────────────────────────────────
  loadFeed();

})();
</script>
</body>
</html>
