<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscar — grau.bearblog.dev</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Verdana, sans-serif;
    font-size: 1rem;
    line-height: 1.6;
    color: #444;
    max-width: 720px;
    margin: auto;
    padding: 20px;
    background: #fff;
  }
  h1 { font-size: 1.5rem; color: #222; margin-bottom: 0.3rem; }
  .back { font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; display: block; }
  .back a { color: #3273dc; text-decoration: none; }
  .back a:hover { text-decoration: underline; }
  #buscador-input-wrap {
    position: relative;
    margin-bottom: 0.75rem;
  }
  #buscador-input-wrap svg {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  #buscador-q {
    width: 100%;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    font-family: inherit;
    font-size: 1rem;
    border: 1.5px solid #ccc;
    border-radius: 4px;
    outline: none;
  }
  #buscador-q:focus { border-color: #333; }
  #buscador-status {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 1rem;
    min-height: 1.2em;
  }
  .b-card {
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.8rem;
  }
  .b-card a {
    font-weight: bold;
    display: block;
    margin-bottom: 0.2rem;
    color: #3273dc;
    text-decoration: none;
  }
  .b-card a:hover { text-decoration: underline; }
  .b-date { font-size: 0.75rem; color: #888; margin-bottom: 0.4rem; }
  .b-excerpt { font-size: 0.9rem; color: #555; line-height: 1.5; }
  .b-excerpt mark { background: #ffeaa0; border-radius: 2px; padding: 0 2px; }
  .b-tags { margin-top: 0.5rem; font-size: 0.75rem; color: #888; }
  .b-nada { font-style: italic; color: #888; }
</style>
</head>
<body>

<span class="back"><a href="https://grau.bearblog.dev">← grau.bearblog.dev</a></span>
<h1>Buscar</h1>
<p style="font-size:0.85rem;color:#888;margin-bottom:1.5rem;">Busca en títulos, textos y etiquetas de todas las entradas.</p>

<div id="buscador-input-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="search" id="buscador-q" placeholder="Busca títulos, textos, etiquetas…" autocomplete="off">
</div>
<div id="buscador-status"></div>
<div id="buscador-results"></div>

<script>
(function() {
  const FEED = 'https://api.allorigins.win/raw?url=https://grau.bearblog.dev/feed/';
  let posts = [], loaded = false;
  const input = document.getElementById('buscador-q');
  const status = document.getElementById('buscador-status');
  const results = document.getElementById('buscador-results');

  async function loadFeed() {
    status.textContent = 'Cargando entradas…';
    try {
      const res = await fetch(FEED);
      const text = await res.text();
      const xml = new DOMParser().parseFromString(text, 'application/xml');
      const items = xml.querySelectorAll('entry, item');
      posts = Array.from(items).map(item => {
        const title = item.querySelector('title')?.textContent || '';
        const link = item.querySelector('link')?.getAttribute('href') || item.querySelector('link')?.textContent || '';
        const date = item.querySelector('published, pubDate')?.textContent || '';
        const content = item.querySelector('content, description')?.textContent || '';
        const cats = Array.from(item.querySelectorAll('category')).map(c => c.getAttribute('term') || c.textContent).filter(Boolean);
        const tmp = document.createElement('div');
        tmp.innerHTML = content;
        return { title, link, date, plain: tmp.textContent || '', cats };
      });
      loaded = true;
      status.textContent = posts.length + ' entradas indexadas';
    } catch(e) {
      status.textContent = 'Error al cargar el feed.';
    }
  }

  function hl(text, q) {
    if (!q) return text;
    return text.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
  }

  function exerpt(text, q) {
    const idx = q ? text.toLowerCase().indexOf(q.toLowerCase()) : -1;
    let s = Math.max(0, idx > 60 ? idx - 60 : 0);
    let chunk = text.slice(s, s + 200);
    if (s > 0) chunk = '…' + chunk;
    if (s + 200 < text.length) chunk += '…';
    return hl(chunk, q);
  }

  function fmtDate(raw) {
    if (!raw) return '';
    const d = new Date(raw);
    return isNaN(d) ? raw : d.toLocaleDateString('es-ES', {year:'numeric',month:'long',day:'numeric'});
  }

  function search(query) {
    if (!loaded) return;
    const q = query.trim().toLowerCase();
    if (!q) { results.innerHTML = ''; status.textContent = posts.length + ' entradas indexadas'; return; }
    const matched = posts.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.plain.toLowerCase().includes(q) ||
      p.cats.some(c => c.toLowerCase().includes(q))
    );
    status.textContent = matched.length + ' resultado' + (matched.length !== 1 ? 's' : '') + ' para "' + query.trim() + '"';
    if (!matched.length) { results.innerHTML = '<p class="b-nada">No se encontró nada.</p>'; return; }
    results.innerHTML = matched.map(p =>
      '<div class="b-card">' +
      '<a href="' + p.link + '" target="_blank">' + hl(p.title, query.trim()) + '</a>' +
      '<div class="b-date">' + fmtDate(p.date) + '</div>' +
      '<div class="b-excerpt">' + exerpt(p.plain, query.trim()) + '</div>' +
      (p.cats.length ? '<div class="b-tags">' + p.cats.map(c=>'#'+c).join(' ') + '</div>' : '') +
      '</div>'
    ).join('');
  }

  loadFeed();
  let timer;
  input.addEventListener('input', function(e) {
    clearTimeout(timer);
    timer = setTimeout(function(){ search(e.target.value); }, 250);
  });
})();
</script>
</body>
</html>
